<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indoson Infratech</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Segoe UI', sans-serif;
}

body{
  background:#0d0d0d;
  color:white;
}

/* HERO */
.hero{
  height:100vh;
  overflow:hidden;
  position:relative;
}

.hero img{
  width:100%;
  height:100%;
  object-fit:cover;
  transform:scale(1.2);
}

.hero-content{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}

.hero h1{
  font-size:70px;
  letter-spacing:6px;
}

.hero p{
  color:#ccc;
  margin-top:10px;
}

/* SECTION */
.section{
  padding:150px 12%;
}

.section h2{
  font-size:50px;
  margin-bottom:20px;
}

/* PROJECT */
.project{
  margin-bottom:150px;
  overflow:hidden;
}

.project img{
  width:100%;
  height:500px;
  object-fit:cover;
  transform:scale(1.2);
}

/* FOOTER */
.footer{
  padding:100px;
  text-align:center;
  color:#888;
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <img src="https://images.unsplash.com/photo-1504307651254-35680f356dfd?auto=format&fit=crop&w=1600&q=80">
  <div class="hero-content">
    <h1>INDOSON INFRATECH</h1>
    <p>Industrial Structures Crafted with Precision</p>
  </div>
</section>

<!-- ABOUT -->
<section class="section">
  <h2>About</h2>
  <p>We create high-performance steel structures and PEB solutions.</p>
</section>

<!-- PROJECTS -->
<section class="section">
  <div class="project">
    <img src="https://images.unsplash.com/photo-1513828583688-c52646db42da?auto=format&fit=crop&w=1200&q=80">
  </div>

  <div class="project">
    <img src="https://images.unsplash.com/photo-1503387762-592deb58ef4e?auto=format&fit=crop&w=1200&q=80">
  </div>
</section>

<!-- FOOTER -->
<div class="footer">
  Indoson Infratech
</div>

<!-- GSAP -->
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

<!-- LENIS (SMOOTH SCROLL) -->
<script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.29/bundled/lenis.min.js"></script>

<script>
// LENIS SMOOTH SCROLL
const lenis = new Lenis({
  smooth: true
});

function raf(time) {
  lenis.raf(time);
  requestAnimationFrame(raf);
}
requestAnimationFrame(raf);

// HERO ANIMATION
gsap.to(".hero img", {
  scale:1,
  duration:2,
  ease:"power3.out"
});

// PROJECT PARALLAX
document.querySelectorAll(".project img").forEach(img => {
  gsap.to(img, {
    scrollTrigger:{
      trigger: img,
      start:"top bottom",
      end:"bottom top",
      scrub: true
    },
    scale:1
  });
});
</script>

</body>
</html>
