<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Indoson Infratech</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
    }
  </style>
</head>

<body>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

// Scene
const scene = new THREE.Scene();

// Camera
const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);
camera.position.z = 5;

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Light
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5, 5, 5);
scene.add(light);

// Loader (REAL STEEL MODEL)
const loader = new GLTFLoader();

loader.load(
  "https://threejs.org/examples/models/gltf/metal_plate/scene.gltf",
  function (gltf) {
    const beam = gltf.scene;

    beam.scale.set(2, 2, 2);   // make it visible
    beam.position.y = 0;

    scene.add(beam);

    animate(); // start animation only after model loads
  },
  undefined,
  function (error) {
    console.error("Model failed to load:", error);
  }
);

// Animation loop
function animate() {
  requestAnimationFrame(animate);

  scene.rotation.y += 0.003;

  renderer.render(scene, camera);
}

// Responsive
window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
});

</script>

</body>
</html>
