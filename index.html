<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Indoson Infratech</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
    }
  </style>
</head>
<body>

<!-- Three.js CDN -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
// Scene
const scene = new THREE.Scene();

// Camera
const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);
camera.position.z = 5;

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Geometry (Beam placeholder)
// Steel material
const material = new THREE.MeshStandardMaterial({
  color: 0x4a5560,
  metalness: 0.8,
  roughness: 0.3
});

// ===== I-BEAM (realistic steel section) =====

// Top flange
const topFlange = new THREE.Mesh(
  new THREE.BoxGeometry(2, 0.2, 0.4),
  material
);
topFlange.position.y = 1.4;

// Bottom flange
const bottomFlange = new THREE.Mesh(
  new THREE.BoxGeometry(2, 0.2, 0.4),
  material
);
bottomFlange.position.y = -1.4;

// Web (middle vertical plate)
const web = new THREE.Mesh(
  new THREE.BoxGeometry(0.2, 3, 0.3),
  material
);

// Group all parts
const beam = new THREE.Group();
beam.add(topFlange);
beam.add(bottomFlange);
beam.add(web);

scene.add(beam);

// Light
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5, 5, 5);
scene.add(light);

// Animation loop
function animate() {
  requestAnimationFrame(animate);

  // slow rotation (just for testing)
  beam.rotation.y += 0.01;

  renderer.render(scene, camera);
}

animate();

// Responsive
window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
});
</script>

</body>
</html>
