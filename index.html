<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Indoson Infratech</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:#0b0b0b;
  color:white;
  font-family:'Inter', sans-serif;
  cursor:none;
}

/* LOADER */
.loader{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:500;
  font-family:'Playfair Display';
  font-size:28px;
  letter-spacing:4px;
}

/* CURSOR */
.cursor{
  width:20px;
  height:20px;
  border:1px solid white;
  border-radius:50%;
  position:fixed;
  pointer-events:none;
  transform:translate(-50%,-50%);
  z-index:300;
}

/* NAVBAR */
.nav{
  position:fixed;
  top:0;
  width:100%;
  padding:25px 8%;
  display:flex;
  justify-content:space-between;
  z-index:100;
  background:linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
}

.logo{
  font-family:'Playfair Display';
  letter-spacing:2px;
}

.nav-links a{
  margin-left:30px;
  text-decoration:none;
  color:#ccc;
  transition:0.3s;
}

.nav-links a:hover{color:white;}

/* HERO */
.hero{
  height:100vh;
  position:relative;
  overflow:hidden;
}

.hero img{
  width:100%;
  height:100%;
  object-fit:cover;
  transform:scale(1.25);
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.35);
}

.hero-content{
  position:absolute;
  bottom:12%;
  left:8%;
  max-width:700px;
}

.hero h1{
  font-family:'Playfair Display';
  font-size:80px;
  letter-spacing:3px;
}

.hero p{
  margin-top:15px;
  color:#bbb;
}

/* SECTION */
.section{
  padding:180px 8%;
}

/* ABOUT */
.about h2{
  font-family:'Playfair Display';
  font-size:50px;
  margin-bottom:20px;
}

.about p{
  max-width:700px;
  line-height:1.9;
  color:#aaa;
}

/* PROJECTS */
.project{
  margin-bottom:160px;
  overflow:hidden;
}

.project img{
  width:100%;
  height:550px;
  object-fit:cover;
  transform:scale(1.2);
  transition:1s;
}

.project:hover img{
  transform:scale(1.05);
}

/* WHATSAPP */
.whatsapp{
  position:fixed;
  bottom:25px;
  right:25px;
  background:#25D366;
  color:white;
  padding:12px 18px;
  border-radius:30px;
  text-decoration:none;
  font-size:14px;
  z-index:200;
}
</style>
</head>

<body>

<!-- LOADER -->
<div class="loader">INDOSON</div>

<!-- CURSOR -->
<div class="cursor"></div>

<!-- NAVBAR -->
<nav class="nav">
  <div class="logo">INDOSON</div>
  <div class="nav-links">
    <a href="#about">About</a>
    <a href="#projects">Projects</a>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <img src="https://images.unsplash.com/photo-1504307651254-35680f356dfd?auto=format&fit=crop&w=1600&q=80">
  <div class="hero-content">
    <h1>Indoson Infratech</h1>
    <p>Engineering precision steel structures.</p>
  </div>
</section>

<!-- ABOUT -->
<section class="section about" id="about">
  <h2>About</h2>
  <p>
    Indoson Infratech specializes in pre-engineered buildings,
    steel fabrication, and industrial construction solutions.
  </p>
</section>

<!-- PROJECTS -->
<section class="section projects" id="projects">

  <div class="project hover-target">
    <img src="https://images.unsplash.com/photo-1513828583688-c52646db42da?auto=format&fit=crop&w=1200&q=80">
  </div>

  <div class="project hover-target">
    <img src="https://images.unsplash.com/photo-1503387762-592deb58ef4e?auto=format&fit=crop&w=1200&q=80">
  </div>

  <div class="project hover-target">
    <img src="https://images.unsplash.com/photo-1489515217757-5fd1be406fef?auto=format&fit=crop&w=1200&q=80">
  </div>

</section>

<!-- WHATSAPP -->
<a class="whatsapp" href="https://wa.me/91XXXXXXXXXX" target="_blank">
  Chat on WhatsApp
</a>

<!-- SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.29/bundled/lenis.min.js"></script>

<script>
gsap.registerPlugin(ScrollTrigger);

// LOADER
gsap.to(".loader",{
  opacity:0,
  duration:1,
  delay:1.2,
  onComplete:()=>document.querySelector(".loader").style.display="none"
});

// SMOOTH SCROLL
const lenis=new Lenis({smooth:true,lerp:0.08});
function raf(t){lenis.raf(t);requestAnimationFrame(raf);}
requestAnimationFrame(raf);

// HERO
gsap.to(".hero img",{scale:1,duration:2});

// ABOUT
gsap.from(".about h2, .about p",{
  scrollTrigger:{trigger:".about",start:"top 80%"},
  y:80,opacity:0,duration:1.2,stagger:0.2
});

// PROJECT PARALLAX
document.querySelectorAll(".project img").forEach(img=>{
  gsap.to(img,{
    scrollTrigger:{trigger:img,start:"top bottom",end:"bottom top",scrub:true},
    scale:1
  });
});

// NAV
document.querySelectorAll('.nav-links a').forEach(link=>{
  link.addEventListener('click',e=>{
    e.preventDefault();
    lenis.scrollTo(document.querySelector(link.getAttribute('href')));
  });
});

// CURSOR
const cursor=document.querySelector('.cursor');
window.addEventListener('mousemove',e=>{
  cursor.style.top=e.clientY+'px';
  cursor.style.left=e.clientX+'px';
});

document.querySelectorAll('.hover-target').forEach(el=>{
  el.addEventListener('mouseenter',()=>{
    cursor.style.transform="translate(-50%,-50%) scale(2)";
  });
  el.addEventListener('mouseleave',()=>{
    cursor.style.transform="translate(-50%,-50%) scale(1)";
  });
});
</script>

</body>
</html>
