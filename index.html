<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Indoson Infratech</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#0b0b0b;
  color:white;
  font-family:'Inter', sans-serif;
}

/* HERO */
.hero{
  height:100vh;
  position:relative;
  overflow:hidden;
}

.hero img{
  width:100%;
  height:100%;
  object-fit:cover;
  transform:scale(1.25);
}

/* DARK OVERLAY */
.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.35);
}

/* TEXT POSITIONING (IMPORTANT) */
.hero-content{
  position:absolute;
  bottom:12%;
  left:8%;
  z-index:2;
  max-width:700px;
}

.hero h1{
  font-family:'Playfair Display', serif;
  font-size:80px;
  line-height:1.1;
  letter-spacing:3px;
}

.hero p{
  margin-top:20px;
  color:#bbb;
  font-size:18px;
  line-height:1.6;
}
</style>
</head>

<body>

<section class="hero">
  <img src="https://images.unsplash.com/photo-1504307651254-35680f356dfd?auto=format&fit=crop&w=1600&q=80">

  <div class="hero-content">
    <h1>Indoson Infratech</h1>
    <p>
      Engineering precision steel structures and industrial spaces
      designed for performance, scale, and durability.
    </p>
  </div>
</section>

<!-- GSAP -->
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

<script>
// HERO CINEMATIC ZOOM
gsap.to(".hero img", {
  scale:1,
  duration:2,
  ease:"power3.out"
});
</script>

</body>
</html>
