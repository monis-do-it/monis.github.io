<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Indoson Infratech</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      color: white;
    }

    /* TEXT OVERLAY */
    .hero {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 10;
    }

    h1 {
      font-size: 50px;
      letter-spacing: 3px;
      margin: 0;
    }

    p {
      margin: 10px 0 20px;
      font-size: 18px;
      color: #ccc;
    }

    button {
      padding: 12px 24px;
      border: none;
      background: white;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="hero">
  <h1>INDOSON INFRATECH</h1>
  <p>Precision in Steel Structures</p>
  <button>View Projects</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
// Scene
const scene = new THREE.Scene();

// Camera
const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);
camera.position.z = 5;

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Material
const material = new THREE.MeshStandardMaterial({
  color: 0x4a5560,
  metalness: 0.8,
  roughness: 0.3
});

// I-BEAM
const topFlange = new THREE.Mesh(
  new THREE.BoxGeometry(2, 0.2, 0.4),
  material
);
topFlange.position.y = 1.4;

const bottomFlange = new THREE.Mesh(
  new THREE.BoxGeometry(2, 0.2, 0.4),
  material
);
bottomFlange.position.y = -1.4;

const web = new THREE.Mesh(
  new THREE.BoxGeometry(0.2, 3, 0.3),
  material
);

const beam = new THREE.Group();
beam.add(topFlange, bottomFlange, web);
scene.add(beam);

// Light
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5, 5, 5);
scene.add(light);

// Animation
function animate() {
  requestAnimationFrame(animate);
  beam.rotation.y += 0.01;
  renderer.render(scene, camera);
}
animate();

// Resize
window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
});
</script>

</body>
</html>
